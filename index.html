<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>မြန်မာဗေဒင်</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Myanmar Text', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 600px; margin: 0 auto; }
        .card { background: white; border-radius: 24px; padding: 24px; margin-bottom: 20px; }
        .header { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; text-align: center; }
        input { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 16px; margin-bottom: 12px; }
        button {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white; border: none; padding: 12px; border-radius: 16px;
            font-size: 16px; font-weight: 600; cursor: pointer; width: 100%;
        }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { flex: 1; text-align: center; padding: 10px; background: #f1f5f9; border-radius: 16px; cursor: pointer; }
        .tab.active { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; }
        .notification { position: fixed; bottom: 20px; left: 20px; right: 20px; background: #1e293b; color: white; padding: 14px; border-radius: 20px; text-align: center; z-index: 1100; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card header"><h1>🔮 မြန်မာဗေဒင်</h1><p>အွန်လိုင်းဗေဒင်မေးမြန်းရန်</p></div>

        <div class="card">
            <div class="tabs">
                <div class="tab active" onclick="showLogin()">🔐 ဝင်ရောက်ရန်</div>
                <div class="tab" onclick="showRegister()">📝 အကောင့်ဖွင့်ရန်</div>
            </div>
            <div id="loginDiv">
                <input type="email" id="email" placeholder="Email">
                <input type="password" id="password" placeholder="စကားဝှက်">
                <button onclick="login()">ဝင်ရောက်မည်</button>
            </div>
            <div id="registerDiv" style="display:none">
                <input type="text" id="regName" placeholder="အမည်">
                <input type="email" id="regEmail" placeholder="Email">
                <input type="password" id="regPassword" placeholder="စကားဝှက်">
                <button onclick="register()">အကောင့်ဖွင့်မည်</button>
            </div>
        </div>
        <div id="result" style="color:white; text-align:center; margin-top:20px;"></div>
    </div>

    <script>
        // Supabase Config
        const SUPABASE_URL = "https://lbxwviupwxdigjfatlom.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxieHd2aXVwd3hkaWdqZmF0bG9tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1ODUzNjYsImV4cCI6MjA5MDE2MTM2Nn0.E8w_xZ0Rxp812nPdKDArB_2TtSZ5PIgoJZlkgBNtE0k";
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        function showNotification(msg) {
            let n = document.createElement('div');
            n.className = 'notification';
            n.innerText = msg;
            document.body.appendChild(n);
            setTimeout(() => n.remove(), 3000);
        }
        
        function showLogin() {
            document.getElementById('loginDiv').style.display = 'block';
            document.getElementById('registerDiv').style.display = 'none';
        }
        
        function showRegister() {
            document.getElementById('loginDiv').style.display = 'none';
            document.getElementById('registerDiv').style.display = 'block';
        }
        
        async function login() {
            let email = document.getElementById('email').value;
            let password = document.getElementById('password').value;
            if (!email || !password) return showNotification('အချက်အလက်ဖြည့်ပါ');
            
            const { data, error } = await supabase
                .from('users')
                .select('*')
                .eq('email', email)
                .eq('password', password);
                
            if (error) {
                showNotification('Error: ' + error.message);
                return;
            }
            if (!data || data.length === 0) {
                showNotification('Email/စကားဝှက် မှား');
                return;
            }
            showNotification('အောင်မြင်ပါသည်။ ကြိုဆိုပါတယ် ' + data[0].name);
            document.getElementById('result').innerHTML = '✅ ဝင်ရောက်ပြီးပါပြီ။ ' + data[0].name;
        }
        
        async function register() {
            let name = document.getElementById('regName').value;
            let email = document.getElementById('regEmail').value;
            let password = document.getElementById('regPassword').value;
            if (!name || !email || !password) return showNotification('အချက်အလက်ဖြည့်ပါ');
            
            const { data: existing } = await supabase.from('users').select('*').eq('email', email);
            if (existing && existing.length > 0) {
                showNotification('Email ရှိပြီးသား');
                return;
            }
            
            const { error } = await supabase.from('users').insert([{
                id: Date.now(),
                name: name,
                email: email,
                password: password,
                role: 'user',
                balance: 10000,
                is_approved: true,
                earnings: 0
            }]);
            
            if (error) {
                showNotification('Error: ' + error.message);
                return;
            }
            showNotification('အကောင့်အောင်မြင်ပါသည်');
            showLogin();
        }
        
        // Check if Supabase is working
        async function checkConnection() {
            const { data, error } = await supabase.from('users').select('count').limit(1);
            if (error) {
                document.getElementById('result').innerHTML = '❌ Connection Error: ' + error.message;
            } else {
                document.getElementById('result').innerHTML = '✅ Supabase Connected!';
            }
        }
        checkConnection();
    </script>
</body>
</html>
